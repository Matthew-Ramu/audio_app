  <style>
    .visually-hidden {

      margin: -1px;

    }
    .guide-hero {

    }
    .guide-hero h1 {

      font-size: clamp(1.15rem, 3.5vw, 1.65rem);

      color: var(--gold-bright);
      text-shadow: 0 0 28px var(--accent-glow), 0 2px 0 rgba(0, 0, 0, 0.45);
      line-height: 1.45;
      max-width: 42rem;
      margin: 0 auto;
    }
    .guide-step {

    }

      font-size: 1.02rem;
      margin-bottom: 0.65rem;
    }
    .guide-step-body {
      color: var(--text-muted);

      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .guide-figure {
      margin: 0;
      padding: 0;
    }
    .guide-figure img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid rgba(200, 208, 220, 0.42);
      box-shadow:

        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      cursor: zoom-in;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .guide-figure img:hover {
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(201, 169, 98, 0.28);
      transform: translateY(-1px);
    }
    .guide-img-hint {
      margin-top: 0.55rem;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: rgba(154, 160, 174, 0.85);
      text-align: center;
    }
    .guide-lightbox {
      max-width: min(96vw, 1200px);
      width: 96vw;
      padding: 0;
      border: 1px solid rgba(201, 169, 98, 0.35);
      border-radius: 8px;
      background: linear-gradient(180deg, #1e1f22 0%, #121314 100%);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.75);
    }
    .guide-lightbox::backdrop {
      background: rgba(6, 7, 9, 0.82);
      backdrop-filter: blur(6px);
    }
    .guide-lightbox-inner {
      position: relative;
      padding: 2.5rem 0.75rem 0.75rem;
    }
    .guide-lightbox-close {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 2.25rem;
      height: 2.25rem;
      border: 1px solid rgba(201, 169, 98, 0.35);
      border-radius: 6px;
      background: rgba(30, 31, 34, 0.95);
      color: var(--gold-bright);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
    }
    .guide-lightbox-close:hover {
      background: rgba(201, 169, 98, 0.12);
    }
    .guide-lightbox img {
      display: block;
      width: 100%;
      max-height: min(85vh, 900px);
      height: auto;
      object-fit: contain;
      margin: 0 auto;
      border-radius: 4px;
    }

          navDb: "dB",

          pageTitle: "Roon と HQPlayer を連携：ゼロから始める高音質設定ガイド",

          step2Body:

          step3Body:

          imgAlt1: "Roon 设置：Setup 标签下的 HQPlayer 与 Add HQPlayer",

          footerNote: "教学指南 · 与 ROON／HQPLAYER 无关联"
        },
        "zh-TW": {
          htmlLang: "zh-Hant",
          docTitle: "Roon 串聯 HQPlayer 設定指南 · Hi-End Lab",
          langLabel: "語言",
          navBrandText: "Hi-End Lab",
          navRoonHqp: "roon+HQPlayer 設定",
          navTools: "計算工具",
          navKnowledge: "知識科普",
          navRoon: "roon",
          navDamping: "阻尼",
          navCable: "線材",
          navHq: "濾波表",
          navDb: "分貝",
          brandLine: "Hi-End Digital Audio Lab",
          pageTitle: "Roon 串聯 HQPlayer：從零開始的極致音質設定指南",
          step1Title: "步驟一：在 Roon 中添加 HQPlayer 控制節點",
          step1Body:
            "打開 Roon 的 <strong>Settings（設定）</strong>，切換到 <strong>Setup</strong> 標籤頁。在下方找到 <strong>HQPlayer</strong> 區塊，點擊右側的 <strong>Add HQPlayer</strong> 按鈕。",

            "在右側視窗中選取 <strong>HQPlayer</strong>；之後在裝置選擇時，即可找到 HQPlayer。",

          step3Body:
            "點擊 <strong>Add</strong> 後，回到 Roon 播放主介面，在右下角的 <strong>音訊區域（Zone）</strong> 切換至剛剛添加的 HQPlayer。現在，您已經成功啟動了地表最強的數位播放組合！",
          imgTapHint: "點擊可查看大圖",
          imgAlt1: "Roon 設定：Setup 分頁中的 HQPlayer 與 Add HQPlayer",
          imgAlt2: "新增裝置視窗中選取 HQPlayer",
          lightboxClose: "關閉",
          footerCopy: "音響工程師的數位工具箱 © 2024",
          footerNote: "教學指南 · 與 ROON／HQPLAYER 無商業關聯"
        }
      };

      function getStrings(lang) {
        return STRINGS[lang] || STRINGS[DEFAULT_LANG];
      }

      function setBodyLangClass(lang) {
        document.body.classList.remove("lang-en", "lang-ja", "lang-zh-CN", "lang-zh-TW");
        document.body.classList.add("lang-" + lang);
      }

      var langSelect = document.getElementById("lang-select");
      var currentLang = DEFAULT_LANG;
      var lightbox = document.getElementById("lightbox");
      var lightboxImg = document.getElementById("lightbox-img");
      var lightboxClose = document.getElementById("lightbox-close");

      function wireLightbox(imgId) {
        var el = document.getElementById(imgId);
        if (!el) return;
        el.addEventListener("click", function () {
          var L = getStrings(currentLang);
          var src = el.getAttribute("data-full") || el.src;
          lightboxImg.src = src;
          lightboxImg.alt = el.alt || "";
          lightboxClose.setAttribute("aria-label", L.lightboxClose);
          if (typeof lightbox.showModal === "function") {
            lightbox.showModal();
          }
        });
      }

      lightboxClose.addEventListener("click", function () {
        lightbox.close();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && lightbox.open) lightbox.close();
      });
      lightbox.addEventListener("click", function (e) {
        if (e.target === lightbox) lightbox.close();
      });

      function applyLocale(lang) {
        if (!STRINGS[lang]) lang = DEFAULT_LANG;
        currentLang = lang;
        setBodyLangClass(lang);
        document.documentElement.dir = "ltr";
        var L = getStrings(lang);
        document.documentElement.lang = L.htmlLang;
        document.title = L.docTitle;

        document.getElementById("nav-brand-text").textContent = L.navBrandText;
        document.getElementById("nav-roon-hqp").textContent = L.navRoonHqp;
        document.getElementById("nav-link-tools").textContent = L.navTools;
        document.getElementById("nav-link-knowledge").textContent = L.navKnowledge;
        document.getElementById("nav-roon").textContent = L.navRoon;
        document.getElementById("nav-damping").textContent = L.navDamping;
        document.getElementById("nav-cable").textContent = L.navCable;
        document.getElementById("nav-hq").textContent = L.navHq;
        document.getElementById("nav-db").textContent = L.navDb;

        document.getElementById("i18n-lang-label").textContent = L.langLabel;
        document.getElementById("i18n-brand").textContent = L.brandLine;
        document.getElementById("i18n-page-title").textContent = L.pageTitle;
        document.getElementById("step1-title").textContent = L.step1Title;
        document.getElementById("step1-body").innerHTML = L.step1Body;
        document.getElementById("step2-title").textContent = L.step2Title;
        document.getElementById("step2-body").innerHTML = L.step2Body;
        document.getElementById("step3-title").textContent = L.step3Title;
        document.getElementById("step3-body").innerHTML = L.step3Body;

        document.getElementById("img-hint-1").textContent = L.imgTapHint;
        document.getElementById("img-hint-2").textContent = L.imgTapHint;
        document.getElementById("img-step1").alt = L.imgAlt1;
        document.getElementById("img-step2").alt = L.imgAlt2;
        lightboxClose.setAttribute("aria-label", L.lightboxClose);

        document.getElementById("i18n-footer-copy").textContent = L.footerCopy;
        document.getElementById("i18n-footer-note").textContent = L.footerNote;

        langSelect.value = lang;
        try {
          localStorage.setItem(STORAGE_KEY, lang);
        } catch (e) {}
      }

      wireLightbox("img-step1");
      wireLightbox("img-step2");

      langSelect.addEventListener("change", function () {
        applyLocale(langSelect.value);
      });

      var initial = DEFAULT_LANG;
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved && STRINGS[saved]) initial = saved;
      } catch (e) {}
      applyLocale(initial);
    })();
  </script>
</body>
