<body class="lang-zh-TW">
  <nav class="site-nav" aria-label="Primary navigation">

  <div class="wrap">
    <header class="page-section page-hero" id="top">
      <div class="brand-line" id="i18n-brand"></div>

    </header>

    <section class="panel tool-single page-section" aria-labelledby="i18n-page-title">
      <p class="hint" id="cable-hint"></p>
      <div class="calc-two-col">
        <div class="field">
          <label for="cable-length" id="i18n-cable-len-label"></label>
          <input type="number" id="cable-length" min="0" step="0.5" value="15" inputmode="decimal" />
        </div>
        <div class="field">
          <label for="cable-preset" id="i18n-cable-preset-label"></label>
          <select id="cable-preset">
            <option value="0.12">—</option>
            <option value="0.08">—</option>
            <option value="0.04">—</option>
          </select>
        </div>
      </div>
      <label for="cable-load-z" id="i18n-cable-load-label"></label>
      <input type="number" id="cable-load-z" min="1" step="100" value="47000" inputmode="numeric" />
      <p class="hint" id="cable-model-hint"></p>
      <button type="button" class="btn-3d" id="btn-cable"></button>
      <div id="cable-result" class="result-block" hidden>
        <div class="result-value" id="cable-value"></div>
        <p class="result-note" id="cable-note"></p>
      </div>
    </section>
    <footer class="site-footer">
      <p class="footer-copy" id="i18n-footer-copy"></p>
      <p class="footer-note" id="i18n-footer-note"></p>
    </footer>
  </div>
  <script>
    (function () {

      var STORAGE_KEY = "hiend-audio-calc-lang";
      var DEFAULT_LANG = "zh-TW";
            var STRINGS = {
        en: {
          htmlLang: "en",

          navRoon: "roon",
          navRoonHqp: "Roon + HQPlayer setup",
          navDamping: "DF",
          navCable: "Cable",
          navHq: "Filters",
          navDb: "dB",
          brandLine: "Hi-End Digital Audio Lab",
          cableTitle: "Cable length — level loss (estimate)",
          footerCopy: "Sound Engineer’s Digital Toolbox © 2024",
          footerNote: "REFERENCE TOOL · NOT AFFILIATED WITH HQPLAYER",
          cableHint: "Rough resistive model for line‑level runs: useful sanity‑check for long balanced snakes; not a transmission‑line simulation.",
          cableLenLabel: "Cable length (m)",
          cablePresetLabel: "Copper pair ≈ Ω per conductor / m",
          cablePresetHeavy: "~0.12 Ω/m · thinner / long runs",
          cablePresetMid: "~0.08 Ω/m · typical mic/studio cable",
          cablePresetLight: "~0.04 Ω/m · heavier gauge / short",
          cableLoadLabel: "Downstream load Z (Ω)",
          cableModelHint: "Series model: R<sub>cable</sub> ≈ 2 × length × Ω/m (go + return). Loss<sub>dB</sub> = 20·log<sub>10</sub>(Z<sub>load</sub> / (Z<sub>load</sub> + R<sub>cable</sub>)).",
          btnCable: "Estimate attenuation",
          cableResultHtml: function (lossDb, ratioV, rWire) {
            return (
              "≈ <strong>" +
              lossDb.toFixed(3) +
              "</strong> dB · V ratio <strong>" +
              ratioV.toFixed(5) +
              "</strong> · R<sub>cable</sub> ≈ <strong>" +
              rWire.toFixed(2) +
              "</strong> Ω"
            );
          },
          cableResultExplain: "At high Z<sub>load</sub> (typical line inputs) absolute loss is usually small unless cable is very long and thin. Use AWG tables for serious installs.",
          errCable: "Enter length ≥ 0, valid Ω/m preset, and load > 0.",
        },
        ja: {
          htmlLang: "ja",
          docTitle: "ケーブル・レベル低下（概算） · Hi-End Lab",
          langLabel: "表示言語",
          navBrandText: "Hi-End Lab",
          navTools: "ツール",
          navKnowledge: "解説",
          navRoon: "roon",
          navRoonHqp: "Roon＋HQPlayer 設定",
          navDamping: "DF",
          navCable: "ケーブル",
          navHq: "フィルタ",
          navDb: "dB",
          brandLine: "Hi-End Digital Audio Lab",

          footerCopy: "音響エンジニアのデジタル・ツールボックス © 2024",
          footerNote: "参考ツール · HQPLAYER 非関連",
          cableHint: "ラインレベル長距離配線の抵抗モデル（参考）。伝送線シミュレーションではありません。",
          cableLenLabel: "ケーブル長（m）",
          cablePresetLabel: "導体あたりの概算 Ω／m",
          cablePresetHeavy: "約 0.12 Ω/m · 細め／長め",
          cablePresetMid: "約 0.08 Ω/m · 一般的マイク線級",
          cablePresetLight: "約 0.04 Ω/m · 太め／短め",
          cableLoadLabel: "負荷インピーダンス Z（Ω）",
          cableModelHint: "直列モデル：R<sub>cable</sub> ≈ 2 × 長さ × Ω/m（往復）。損失（dB）= 20·log<sub>10</sub>(Z/(Z+R<sub>cable</sub>))。",
          btnCable: "減衰を見積もる",
          cableResultHtml: function (lossDb, ratioV, rWire) {
            return (
              "約 <strong>" +
              lossDb.toFixed(3) +
              "</strong> dB · 電圧比 <strong>" +
              ratioV.toFixed(5) +
              "</strong> · R<sub>cable</sub> ≈ <strong>" +
              rWire.toFixed(2) +
              "</strong> Ω"
            );
          },
          cableResultExplain: "ラインレベルで負荷が高い場合、抵抗が極端でなければ損失は小さいことが多いです。",
          errCable: "長さ・プリセット・負荷を確認してください。",
        },
        "zh-CN": {
          htmlLang: "zh-Hans",
          docTitle: "线材电平损耗估算 · Hi-End Lab",
          langLabel: "语言",
          navBrandText: "Hi-End Lab",
          navTools: "计算工具",
          navKnowledge: "知识科普",
          navRoon: "roon",
          navRoonHqp: "roon+HQPlayer 设置",
          navDamping: "阻尼",
          navCable: "线材",
          navHq: "滤波表",
          navDb: "分贝",
          brandLine: "Hi-End Digital Audio Lab",
          cableTitle: "线材长度 · 电平损耗估算",
          footerCopy: "音响工程师的数字工具箱 © 2024",
          footerNote: "参考工具 · 与 HQPLAYER 无关联",
          cableHint: "面向线路级长距离传输的简化电阻模型，用于粗估压降；非传输线仿真。",
          cableLenLabel: "线材长度（m）",
          cablePresetLabel: "铜芯约 Ω／每米（单根导体）",
          cablePresetHeavy: "约 0.12 Ω/m · 较细／长线",
          cablePresetMid: "约 0.08 Ω/m · 常见工程线缆",
          cablePresetLight: "约 0.04 Ω/m · 较粗／短线",
          cableLoadLabel: "下一级负载阻抗 Z（Ω）",
          cableModelHint: "串联近似：R<sub>线</sub> ≈ 2 × 长度 × Ω/m（往返）。损耗 dB = 20·log<sub>10</sub>(Z/(Z+R<sub>线</sub>))。",
          btnCable: "估算衰减",
          cableResultHtml: function (lossDb, ratioV, rWire) {
            return (
              "约 <strong>" +
              lossDb.toFixed(3) +
              "</strong> dB · 电压比 <strong>" +
              ratioV.toFixed(5) +
              "</strong> · R<sub>线</sub> ≈ <strong>" +
              rWire.toFixed(2) +
              "</strong> Ω"
            );
          },
          cableResultExplain: "线路输入阻抗很高时，除非线极长且细，绝对损耗通常很小。工程布线请查 AWG 表。",
          errCable: "请检查长度、线型与负载是否为正。",
        },
        "zh-TW": {
          htmlLang: "zh-Hant",
          docTitle: "線材電平損耗估算 · Hi-End Lab",
          langLabel: "語言",
          navBrandText: "Hi-End Lab",
          navTools: "計算工具",
          navKnowledge: "知識科普",
          navRoon: "roon",
          navRoonHqp: "roon+HQPlayer 設定",
          navDamping: "阻尼",
          navCable: "線材",
          navHq: "濾波表",
          navDb: "分貝",
          brandLine: "Hi-End Digital Audio Lab",
          cableTitle: "線材長度 · 電平損耗估算",
          footerCopy: "音響工程師的數位工具箱 © 2024",
          footerNote: "參考工具 · 與 HQPLAYER 無商業關聯",
          cableHint: "面向線路級長距離傳輸的簡化電阻模型，用於粗估壓降；非傳輸線仿真。",
          cableLenLabel: "線材長度（m）",
          cablePresetLabel: "銅芯約 Ω／每米（單根導體）",
          cablePresetHeavy: "約 0.12 Ω/m · 較細／長線",
          cablePresetMid: "約 0.08 Ω/m · 常見工程線纜",
          cablePresetLight: "約 0.04 Ω/m · 較粗／短線",
          cableLoadLabel: "下一級負載阻抗 Z（Ω）",
          cableModelHint: "串聯近似：R<sub>線</sub> ≈ 2 × 長度 × Ω/m（往返）。損耗 dB = 20·log<sub>10</sub>(Z/(Z+R<sub>線</sub>))。",
          btnCable: "估算衰減",
          cableResultHtml: function (lossDb, ratioV, rWire) {
            return (
              "約 <strong>" +
              lossDb.toFixed(3) +
              "</strong> dB · 電壓比 <strong>" +
              ratioV.toFixed(5) +
              "</strong> · R<sub>線</sub> ≈ <strong>" +
              rWire.toFixed(2) +
              "</strong> Ω"
            );
          },
          cableResultExplain: "線路輸入阻抗很高時，除非線極長且細，絕對損耗通常很小。工程佈線請查 AWG 表。",
          errCable: "請檢查長度、線型與負載是否為正。",
        },

      };
      function getStrings(lang) {
        return STRINGS[lang] || STRINGS[DEFAULT_LANG];
      }
      function setBodyLangClass(lang) {
        document.body.classList.remove("lang-en", "lang-ja", "lang-zh-CN", "lang-zh-TW");
        document.body.classList.add("lang-" + lang);
      }
      var langSelect = document.getElementById("lang-select");
      var currentLang = DEFAULT_LANG;

      function applyLocale(lang) {
        if (!STRINGS[lang]) lang = DEFAULT_LANG;
        currentLang = lang;
        setBodyLangClass(lang);
        document.documentElement.dir = "ltr";
        var L = getStrings(lang);
        document.documentElement.lang = L.htmlLang;
        document.title = L.docTitle;
        document.getElementById("nav-brand-text").textContent = L.navBrandText;
        document.getElementById("nav-roon-hqp").textContent = L.navRoonHqp;
        document.getElementById("nav-link-tools").textContent = L.navTools;
        document.getElementById("nav-link-knowledge").textContent = L.navKnowledge;
        document.getElementById("nav-roon").textContent = L.navRoon;
        document.getElementById("nav-damping").textContent = L.navDamping;
        document.getElementById("nav-cable").textContent = L.navCable;
        document.getElementById("nav-hq").textContent = L.navHq;
        document.getElementById("nav-db").textContent = L.navDb;
        document.getElementById("i18n-lang-label").textContent = L.langLabel;
        document.getElementById("i18n-brand").textContent = L.brandLine;
        document.getElementById("i18n-page-title").textContent = L.cableTitle;
        document.getElementById("cable-hint").innerHTML = L.cableHint;
        document.getElementById("i18n-cable-len-label").textContent = L.cableLenLabel;
        document.getElementById("i18n-cable-preset-label").textContent = L.cablePresetLabel;
        var cablePresetEl = document.getElementById("cable-preset");
        cablePresetEl.options[0].text = L.cablePresetHeavy;
        cablePresetEl.options[1].text = L.cablePresetMid;
        cablePresetEl.options[2].text = L.cablePresetLight;
        document.getElementById("i18n-cable-load-label").textContent = L.cableLoadLabel;
        document.getElementById("cable-model-hint").innerHTML = L.cableModelHint;
        document.getElementById("btn-cable").textContent = L.btnCable;
        document.getElementById("i18n-footer-copy").textContent = L.footerCopy;
        document.getElementById("i18n-footer-note").textContent = L.footerNote;
        langSelect.value = lang;
        try {
          localStorage.setItem(STORAGE_KEY, lang);
        } catch (e) {}
      }

      document.getElementById("btn-cable").addEventListener("click", function () {
        var L = getStrings(currentLang);
        var len = parseFloat(document.getElementById("cable-length").value, 10);
        var rPerM = parseFloat(document.getElementById("cable-preset").value, 10);
        var zLoad = parseFloat(document.getElementById("cable-load-z").value, 10);
        var box = document.getElementById("cable-result");
        var valEl = document.getElementById("cable-value");
        var noteEl = document.getElementById("cable-note");
        if (
          Number.isNaN(len) ||
          len < 0 ||
          Number.isNaN(rPerM) ||
          rPerM <= 0 ||
          Number.isNaN(zLoad) ||
          zLoad <= 0
        ) {
          box.hidden = false;
          valEl.textContent = L.errCable;
          valEl.style.color = "#c9a962";
          noteEl.textContent = "";
          return;
        }
        var rWire = 2 * len * rPerM;
        var ratioV = zLoad / (zLoad + rWire);
        var lossDb = 20 * Math.log10(ratioV);
        box.hidden = false;
        valEl.style.color = "";
        valEl.innerHTML = L.cableResultHtml(lossDb, ratioV, rWire);
        noteEl.textContent = L.cableResultExplain;
      });

      langSelect.addEventListener("change", function () {
        applyLocale(langSelect.value);
      });

      var initial = DEFAULT_LANG;
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved && STRINGS[saved]) initial = saved;
      } catch (e) {}
      applyLocale(initial);
    })();
  </script>
</body>
</html>
