            '<table class="hq-compare-table"><thead><tr><th scope="col">滤波／概念</th><th scope="col">负载感</th><th scope="col">适用场景（经验）</th></tr></thead><tbody><tr><td><code>1×</code></td><td>较轻</td><td>不改速率直接噪声整形 — 省 CPU、先求稳定。</td></tr><tr><td><code>N×</code>（2×／4×…）</td><td>较重</td><td>升频后再 SDM — 与 CPU 档位、缓冲联动调节。</td></tr><tr><td><code>poly-sinc-short-mp</code></td><td>最短抽头</td><td>入门算力、长时间播放优先流畅。</td></tr><tr><td><code>poly-sinc-xla</code></td><td>中长 XL</td><td>中端 CPU 的日常平衡选项。</td></tr><tr><td><code>poly-sinc-long-hp</code> 等</td><td>长 sinc</td><td>散热与缓冲有余量时再开。</td></tr><tr><td><code>poly-sinc-gauss-*</code></td><td>高斯窗 · 最重</td><td>旗舰算力、追求高倍率 DSD 路径。</td></tr><tr><td>最小相位／线性相位</td><td>预铃／延迟取舍</td><td><code>-mp</code> 与 <code>-lp</code> 影响脉冲响应形状。</td></tr></tbody></table>',
          dbTitle: "交互式音量换算 · dB ↔ 电压倍",
          dbHint:
            "相对电平 ΔdB：电压乘以 10<sup>Δ/20</sup>。+6 dB ≈ 电压 ×2；-6 dB ≈ ×0.5。",
          dbLabel: "电平变化 ΔdB",
          dbResultHtml: function (ratio, db) {
            return (
              "Δ = <strong>" +
              db +
              "</strong> dB → 电压 × <strong>" +
              ratio.toFixed(5) +
              "</strong>"
            );
          },
          errDb: "請輸入有效數字。",
          footerCopy: "音響工程師的數位工具箱 © 2024",
          footerNote: "參考工具 · 與 HQPLAYER 無商業關聯",
          errVoltage: "請輸入有效的非負電壓數值。",
          xlrResultHtml: function (v) {
            return (
              "对应 XLR 平衡输出约为 <strong>" +
              v +
              "</strong> V<sub>rms</sub>（RCA × 2）"
            );
          },
          xlrBarRcaCaptionHtml: function (v) {
            return "RCA 单端 <strong>" + v + "</strong> V<sub>rms</sub>";
          },
          xlrBarXlrCaptionHtml: function (v) {
            return "XLR 平衡 <strong>" + v + "</strong> V<sub>rms</sub>";
          },
          xlrProgressHint:
            "⚡ 推力直接翻倍！转动相同的音量旋钮，您会听到更饱满的力量，且背景杂音完全消失。"
        }
      };

      function getStrings(lang) {
        return STRINGS[lang] || STRINGS[DEFAULT_LANG];
      }

      function setBodyLangClass(lang) {
        document.body.classList.remove(
          "lang-en",
          "lang-ja",
          "lang-zh-CN",
          "lang-zh-TW"
        );
        document.body.classList.add("lang-" + lang);
      }

      var langSelect = document.getElementById("lang-select");
      var tierEl = document.getElementById("cpu-tier");
      var dsdOutput = document.getElementById("dsd-output");

      var currentLang = DEFAULT_LANG;

      function renderDsd() {
        var L = getStrings(currentLang);
        var rec = {
          entry: L.hqEntry,
          mid: L.hqMid,
          upper: L.hqUpper,
          high: L.hqHigh
        };
        var key = tierEl.value;
        dsdOutput.innerHTML = rec[key] || "";
      }

      function applyLocale(lang) {
        if (!STRINGS[lang]) lang = DEFAULT_LANG;
        currentLang = lang;
        setBodyLangClass(lang);
        document.documentElement.dir = "ltr";
        var L = getStrings(lang);
        document.documentElement.lang = L.htmlLang;
        document.title = L.docTitle;

        document.getElementById("nav-brand-text").textContent = L.navBrandText;
        document.getElementById("nav-roon-hqp").textContent = L.navRoonHqp;
        document.getElementById("nav-link-tools").textContent = L.navTools;
        document.getElementById("nav-link-knowledge").textContent = L.navKnowledge;
        document.getElementById("nav-roon").textContent = L.navRoon;
        document.getElementById("nav-damping").textContent = L.navDamping;
        document.getElementById("nav-cable").textContent = L.navCable;
        document.getElementById("nav-hq").textContent = L.navHq;
        document.getElementById("nav-db").textContent = L.navDb;

        document.getElementById("i18n-lang-label").textContent = L.langLabel;
        document.getElementById("i18n-brand").textContent = L.brandLine;
        document.getElementById("i18n-page-title").textContent = L.pageTitle;
        document.getElementById("i18n-subtitle").textContent = L.subtitle;
        document.getElementById("dsd-title").textContent = L.dsdPanelTitle;
        document.getElementById("i18n-cpu-label").textContent = L.cpuLabel;
        document.getElementById("dsd-hint").textContent = L.dsdHint;
        document.getElementById("xlr-title").textContent = L.xlrPanelTitle;
        document.getElementById("i18n-rca-label").innerHTML = L.rcaLabelHtml;
        document.getElementById("rca-hint").innerHTML = L.rcaHint;
        document.getElementById("btn-calc").textContent = L.btnCalc;
        document.getElementById("xlr-note").textContent = L.xlrNote;
        document.getElementById("xlr-progress-hint").textContent = L.xlrProgressHint;

        document.getElementById("connector-chart-title").textContent = L.connectorDiagramTitle;
        document.getElementById("connector-legend").innerHTML = L.connectorLegendHtml;

        document.getElementById("i18n-footer-copy").textContent = L.footerCopy;
        document.getElementById("i18n-footer-note").textContent = L.footerNote;

        var opts = tierEl.options;
        opts[0].text = L.tierEntry;
        opts[1].text = L.tierMid;
        opts[2].text = L.tierUpper;
        opts[3].text = L.tierHigh;

        langSelect.value = lang;
        try {
          localStorage.setItem(STORAGE_KEY, lang);
        } catch (e) {}

        renderDsd();
        resetXlrResultForLangChange();
        updateSectionNavActive();
      }

      var NAV_SECTION_PAIRS = [["section-tools", "nav-link-tools"]];

      function getScrollSpyLineY() {
        var probe = document.getElementById("section-tools");
        var smPx = 88;
        if (probe) {
          var parsed = parseFloat(getComputedStyle(probe).scrollMarginTop);
          if (!Number.isNaN(parsed)) smPx = parsed;
        }
        return window.pageYOffset + smPx;
      }

      function updateSectionNavActive() {
        var y = getScrollSpyLineY();
        var activeNavId = "nav-link-tools";
        var i;
        for (i = 0; i < NAV_SECTION_PAIRS.length; i++) {
          var sec = document.getElementById(NAV_SECTION_PAIRS[i][0]);
          if (!sec) continue;
          var secTop = sec.getBoundingClientRect().top + window.pageYOffset;
          if (secTop <= y) {
            activeNavId = NAV_SECTION_PAIRS[i][1];
          }
        }
        for (i = 0; i < NAV_SECTION_PAIRS.length; i++) {
          var link = document.getElementById(NAV_SECTION_PAIRS[i][1]);
          if (!link) continue;
          var on = NAV_SECTION_PAIRS[i][1] === activeNavId;
          link.classList.toggle("is-current", on);
          if (on) {
            link.setAttribute("aria-current", "location");
          } else {
            link.removeAttribute("aria-current");
          }
        }
      }

      function throttleNav(fn, ms) {
        var t = null;
        return function () {
          if (t) return;
          t = setTimeout(function () {
            t = null;
            fn();
          }, ms);
        };
      }

      var throttledSectionNav = throttleNav(updateSectionNavActive, 50);

      window.addEventListener("scroll", throttledSectionNav, { passive: true });
      window.addEventListener("resize", updateSectionNavActive);
      window.addEventListener("hashchange", function () {
        setTimeout(updateSectionNavActive, 150);
      });

      document.querySelectorAll('.nav-links a[href^="#"]').forEach(function (a) {
        a.addEventListener("click", function () {
          setTimeout(updateSectionNavActive, 400);
        });
      });

      function resetXlrResultForLangChange() {
        var box = document.getElementById("xlr-result");
        var bars = document.getElementById("xlr-volt-bars");
        box.hidden = true;
        bars.hidden = true;
        document.getElementById("xlr-value").textContent = "";
        document.getElementById("xlr-value").style.color = "";
        document.getElementById("xlr-bar-rca-caption").innerHTML = "";
        document.getElementById("xlr-bar-xlr-caption").innerHTML = "";
      }

      tierEl.addEventListener("change", renderDsd);

      var rcaInput = document.getElementById("rca-volt");
      var btnCalc = document.getElementById("btn-calc");
      var xlrResult = document.getElementById("xlr-result");
      var xlrValue = document.getElementById("xlr-value");
      var xlrNote = document.getElementById("xlr-note");
      var xlrVoltBars = document.getElementById("xlr-volt-bars");
      var xlrBarRcaCaption = document.getElementById("xlr-bar-rca-caption");
      var xlrBarXlrCaption = document.getElementById("xlr-bar-xlr-caption");
      var xlrProgressHint = document.getElementById("xlr-progress-hint");

      btnCalc.addEventListener("click", function () {
        var L = getStrings(currentLang);
        var raw = parseFloat(rcaInput.value, 10);
        if (Number.isNaN(raw) || raw < 0) {
          xlrResult.hidden = false;
          xlrVoltBars.hidden = true;
          xlrNote.hidden = true;
          xlrValue.textContent = L.errVoltage;
          xlrValue.style.color = "#c9a962";
          return;
        }
        var xlr = raw * 2;
        var rcaStr = raw.toFixed(2);
        var xlrStr = xlr.toFixed(2);
        xlrResult.hidden = false;
        xlrVoltBars.hidden = false;
        xlrNote.hidden = false;
        xlrValue.style.color = "";
        xlrValue.innerHTML = L.xlrResultHtml(xlrStr);
        xlrBarRcaCaption.innerHTML = L.xlrBarRcaCaptionHtml(rcaStr);
        xlrBarXlrCaption.innerHTML = L.xlrBarXlrCaptionHtml(xlrStr);
        xlrProgressHint.textContent = L.xlrProgressHint;
        xlrNote.textContent = L.xlrNote;
      });

      langSelect.addEventListener("change", function () {
        applyLocale(langSelect.value);
      });

      var initial = DEFAULT_LANG;
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved && STRINGS[saved]) initial = saved;
      } catch (e) {}
      applyLocale(initial);
      window.addEventListener("load", function () {
        updateSectionNavActive();
      });
    })();
  </script>
</body>
</html>
