          brandLine: "Hi-End Digital Audio Lab",
          pageTitle: "Audiophile Primer",
          subtitle: "PCM · DSD · Upsampling · Playback chain",
          eduLead:
            "Conceptual notes on PCM vs DSD, what DSD means in a playback chain, and why upsampling matters—education only; not a substitute for vendor specs or lab measurements.",
          eduPcmHeading: "PCM vs DSD — key differences",
          eduPcmBody:
            "<p><strong>PCM</strong> (Pulse Code Modulation) is the mainstream digital audio representation: at a fixed <strong>sample rate</strong> (e.g. 44.1, 48, 96, 192 kHz), each instant is stored as a <strong>multi‑bit word</strong> (16/24/32‑bit) for amplitude. Production, editing, mixing, and most distribution (WAV, FLAC, AIFF, etc.) revolve around PCM or lossless wrappers around it.</p><p><strong>DSD</strong> uses a <strong>1‑bit stream at a very high sample rate</strong> (e.g. ~2.8224 MHz for DSD64, then ×2/×4/×8 for higher grades). Information is carried by ultra‑high‑frequency switching density, while quantization noise is typically <strong>noise‑shaped</strong> out of the audible band. Files may appear as DSF/DFF or inside disc images—playback often involves specific filters or SDM paths.</p><div class=\"edu-table-wrap\"><table class=\"edu-compare\"><thead><tr><th scope=\"col\">Aspect</th><th scope=\"col\">PCM</th><th scope=\"col\">DSD</th></tr></thead><tbody><tr><td>How time/amplitude is coded</td><td>Regular samples + multi‑bit depth per sample</td><td>Very high‑rate 1‑bit density; noise shaping is integral</td></tr><tr><td>Production workflow</td><td>Mature tools for edit/mix/master; universal interchange</td><td>Less convenient for heavy editing; niche mastering paths</td></tr><tr><td>Typical DAC paths</td><td>Often filtered directly toward the analog stage (plus OS)</td><td>Native DSD, or conversion to PCM / multibit internally—depends on chip & firmware</td></tr></tbody></table></div><p class=\"edu-note\"><strong>No universal “better sounding” label</strong>: perception depends on the specific master, digital filters, clocking, and the entire analog chain—not the badge “PCM” or “DSD” alone.</p>",
          eduDsdHeading: "What is DSD?",
          eduDsdBody:
            "<p>DSD (Direct Stream Digital) represents analog‑like waveforms using a <strong>very high sample‑rate 1‑bit stream</strong>. Common labels include DSD64 (~2.8224 MHz), DSD128, DSD256, and the enthusiast talking point <strong>DSD512</strong>. Unlike PCM—where each sample stores multi‑bit amplitude—DSD carries information through <strong>ultra‑high‑frequency switching density</strong>, while quantization noise is shaped toward frequencies mostly outside the audible band.</p><p>In practice, even “DSD files” may still pass through <strong>digital filtering, conversion, or remodulation</strong> before reaching the DAC chip; what finally enters the converter may differ from the label on the box. That is why listeners sweat HQPlayer settings—interpolation filters and SDM/Δ‑Σ paths influence <strong>stopband rejection, phase behavior, and the noise spectrum</strong>.</p>",
          eduUpsHeading: "Why upsample?",
          eduUpsBody:
            "<p><strong>Upsampling</strong> raises a lower sample rate toward a higher target (for example, pushing toward a higher DSD multiple). The goal is not to invent missing studio detail, but to give <strong>digital filters and noise shaping</strong> more computational room: transition bands can be tightened and quantization noise pushed farther from sensitive hearing ranges.</p><p>Higher targets usually raise <strong>CPU/memory load, latency, and power draw</strong>; fancier filters also demand disciplined buffering and clocking. Start from <strong>dropout‑free playback</strong>, then increase rate or algorithm weight step by step.</p><ul class=\"edu-list\"><li>If you hear dropouts or buffer warnings: lower the target rate or switch to lighter filters/SDM presets.</li><li>If your system has headroom: try higher DSD multiples with more complete shaping chains.</li><li>Perceived differences still depend on <strong>room acoustics, analog stages, transducers, and placement</strong>—digital processing is only one link.</li></ul>",
          footerCopy: "Sound Engineer’s Digital Toolbox © 2024",
          footerNote: "REFERENCE TOOL · NOT AFFILIATED WITH HQPLAYER"
        },
        ja: {
          htmlLang: "ja",
          docTitle: "オーディオ愛好家向けミニ講座 · PCM／DSD／アップサンプル",
          langLabel: "表示言語",
          navBrandText: "Hi-End Lab",
          navTools: "ツール",
          navKnowledge: "解説",
          navRoon: "roon",
          navRoonHqp: "Roon＋HQPlayer 設定",
          navDamping: "DF",
          navCable: "ケーブル",
          navHq: "フィルタ",
          navDb: "dB",
          brandLine: "Hi-End Digital Audio Lab",
          pageTitle: "オーディオ愛好家向けミニ講座",
          subtitle: "PCM · DSD · アップサンプル · 再生チェーン",
          eduLead:
            "PCM と DSD の違い、再生チェーンでの DSD の意味、アップサンプルの役割を整理したメモです（教育目的／メーカー仕様や計測手順の代替にはなりません）。",
          eduPcmHeading: "PCM と DSD の違いは？",
          eduPcmBody:
            "<p><strong>PCM</strong>（Pulse Code Modulation）は最も一般的なデジタル音響の表現で、<strong>サンプリング周波数</strong>（44.1 kHz、48 kHz、96 kHz、192 kHz など）ごとに<strong>多位元</strong>（16/24/32-bit など）で振幅を記録します。制作・編集・ミックス・マスタリングや WAV／FLAC／AIFF などの流通の中心は PCM（またはその非可逆／可逆ラッパー）です。</p><p><strong>DSD</strong> は<strong>1-bit・超高サンプリングレート</strong>のストリームで波形に近づけます（DSD64 で約 2.8224 MHz、さらに倍率で DSD128／256／512）。情報は超高頻のスイッチング密度で運ばれ、量子化ノイズは<strong>ノイズシェイピング</strong>で可聴帯の外へ押しやすくします。ファイルは DSF／DFF やディスクイメージなどの形があり、再生側ではフィルタや SDM 経路が議論されやすいです。</p><div class=\"edu-table-wrap\"><table class=\"edu-compare\"><thead><tr><th scope=\"col\">項目</th><th scope=\"col\">PCM</th><th scope=\"col\">DSD</th></tr></thead><tbody><tr><td>時間／振幅の表現</td><td>等間隔サンプル + サンプルごとの多位元深度</td><td>超高レート 1-bit の密度変化（ノイズシェイピングが前提）</td></tr><tr><td>制作ワークフロー</td><td>編集・エフェクト処理に強く、エコシステムが成熟</td><td>ヘビー編集には不向きな場合も／マスタリング経路はニッチ寄り</td></tr><tr><td>DAC 側の一般的な扱い</td><td>デジタルフィルタ後にアナログ段へ（オーバーサンプル含む）</td><td>ネイティブ DSD のほか、内部で PCM／マルチビットへ変換する機種も多い</td></tr></tbody></table></div><p class=\"edu-note\"><strong>「どちらが高音質」と一概には言えません</strong>。母帯、フィルタ、クロック、アナログ段を含む<strong>チェーン全体</strong>と室環境・システム次第です。</p>",
          eduDsdHeading: "DSD とは？",
          eduDsdBody:
            "<p>DSD（Direct Stream Digital）は、<strong>超高サンプリングレートの 1-bit ストリーム</strong>で波形を表現する方式です。DSD64（約 2.8224 MHz）、DSD128、DSD256、話題になりやすい <strong>DSD512</strong> などがあります。PCM が「各サンプル点で多位元の振幅」を記録するのに対し、DSD は<strong>超高頻のスイッチング密度</strong>で情報を運び、量子化ノイズを可聴帯の外側へ押しやすくします（ノイズシェイピングの発想）。</p><p>実運用では「DSD ファイル」でも、DAC の直前までに<strong>デジタルフィルタ／変換／再変調</strong>が入ることがあり、パッケージ表示と実際に変換器へ入るストリームが一致しない場合があります。だからこそ HQPlayer の設定や補間フィルタ、SDM／Δ-Σ 経路が議論され、<strong>ストップバンド抑制・位相特性・ノイズスペクトル</strong>に影響します。</p>",
          eduUpsHeading: "なぜアップサンプルするのか？",
          eduUpsBody:
            "<p><strong>アップサンプル（Upsampling）</strong>は、より低いサンプリングレートをより高い目標レートへ引き上げる処理です（より高い DSD 倍率を狙う文脈で語られることが多い）。目的は「録音に無かった細部を捏造する」ことではなく、<strong>デジタルフィルタとノイズシェイピング</strong>に計算の余裕を与えることです。遷移帯域をきれいに設計しやすく、量子化ノイズを感受性の高い周波数から遠ざけやすくなります。</p><p>ただし目標が上がるほど <strong>CPU／メモリ負荷、遅延、消費電力</strong>も増えがちで、精巧なフィルタほどバッファやクロック設計にも敏感になります。まずは<strong>途切れない再生</strong>を優先し、その後に倍率やアルゴリズムを段階的に上げるのが現実的です。</p><ul class=\"edu-list\"><li>クラックノイズやバッファ警告が出る：目標レートを下げる、またはより軽いフィルタ／SDM に。</li><li>マシンに余裕がある：より高い DSD 倍率や整形処理を試す。</li><li>最終的な印象は <strong>室内音響、アナログ段、トランスデューサとセッティング</strong>にも支配されます—デジタル処理は一部です。</li></ul>",
          footerCopy: "音響エンジニアのデジタル・ツールボックス © 2024",
          footerNote: "参考ツール · HQPLAYER 非関連"
        },
        "zh-CN": {
          htmlLang: "zh-Hans",
          docTitle: "发烧友知识科普 · PCM、DSD 与升频",
          langLabel: "语言",
          navBrandText: "Hi-End Lab",
          navTools: "计算工具",
          navKnowledge: "知识科普",
          navRoon: "roon",
          navRoonHqp: "roon+HQPlayer 设置",
          navDamping: "阻尼",
          navCable: "线材",
          navHq: "滤波表",
          navDb: "分贝",
          brandLine: "Hi-End Digital Audio Lab",
          pageTitle: "发烧友知识科普",
          subtitle: "PCM · DSD · 升频 · 播放链",
          eduLead:
            "以下内容说明 PCM 与 DSD 的差异、播放链里 DSD 的含义，以及升频的作用。（科普用途，不能替代原厂规格或实验室测量流程。）",
          eduPcmHeading: "PCM 和 DSD 有什么区别？",
          eduPcmBody:
            "<p><strong>PCM</strong>（脉冲编码调制）是最常见的数字音频形式：在固定的<strong>采样率</strong>（如 44.1 kHz、48 kHz、96 kHz、192 kHz）下，用<strong>多位元</strong>（16-bit、24-bit 等）记录每个采样点的振幅。录音制作、剪辑、混音、母带以及大多数发行格式（WAV、FLAC、AIFF 等）都以 PCM 或其无损封装为主。</p><p><strong>DSD</strong> 则以<strong>1-bit、极高采样率</strong>的码流刻画波形（常见阶梯如 DSD64／128／256／512），通过超高频密度与<strong>噪声整形</strong>把量化噪声推向听觉敏感带以外。文件多为 DSF、DFF 或封装于镜像／专辑数据中；播放时常涉及特定的滤波或 SDM 路径。</p><div class=\"edu-table-wrap\"><table class=\"edu-compare\"><thead><tr><th scope=\"col\">项目</th><th scope=\"col\">PCM</th><th scope=\"col\">DSD</th></tr></thead><tbody><tr><td>时间与振幅编码</td><td>等间隔采样 + 多位元量化深度</td><td>超高采样率 1-bit 密度变化（噪声整形密切相关）</td></tr><tr><td>后期与生态</td><td>编辑、效果与音量处理成熟，兼容面广</td><td>重度编辑不如 PCM 直观；部分母带与工作流较小众</td></tr><tr><td>DAC 常见情形</td><td>多级滤波与超采样后模拟输出</td><td>支持原生 DSD；也可能内部转为 PCM／多位元再输出</td></tr></tbody></table></div><p class=\"edu-note\"><strong>听感没有固定答案</strong>：同一曲目在不同母带、滤波与模拟前端下表现各异；重要的是<strong>整条播放链</strong>是否协调，而不是单独迷信某一种格式标签。</p>",
          eduDsdHeading: "什么是 DSD？",
          eduDsdBody:
            "<p>DSD（Direct Stream Digital）是一种以<strong>极高采样率的 1-bit 码流</strong>来描述模拟波形的格式；常见标识包括 DSD64（约 2.8224 MHz）、DSD128、DSD256，以及发烧讨论里常见的 <strong>DSD512</strong>。与 PCM「在每个采样点用多位元表示振幅」不同，DSD 通过<strong>超高频的密度变化</strong>承载音频，并倾向于把量化噪声推向音乐带宽之外的频段（概念上接近噪声整形）。</p><p>在实际播放中，即便文件标注为 DSD，链路仍可能经历<strong>数字滤波、转换或重新调制</strong>；最终送入 DAC 芯片的数据流，未必与标签完全一致。这也是玩家会细究 HQPlayer、插值滤波器与 SDM／Δ-Σ 路径的原因——它们影响<strong>阻带抑制、相位特性与噪声谱形状</strong>。</p>",
          eduUpsHeading: "为什么要升频？",
          eduUpsBody:
            "<p><strong>升频（Upsampling）</strong>会把较低的采样率推算到更高的目标速率（例如追求更高倍率的 DSD）。它的核心价值并不是「凭空创造录音里没有的细节」，而是为<strong>数字滤波与噪声整形</strong>提供更宽裕的条件：过渡带可以设计得更干净，量化噪声更容易被推离听觉敏感区。</p><p>但升频越高，通常也意味着<strong>CPU／内存占用、延迟与功耗</strong>同步上升；滤波越精密，对时钟与缓冲也越挑剔。建议先保证播放<strong>稳定不卡顿</strong>，再逐步提高目标速率或更换更高阶算法。</p><ul class=\"edu-list\"><li>若出现爆音、卡顿或缓冲警告：降低目标速率，或改用较轻的滤波／SDM。</li><li>若系统仍有裕量：再尝试更高的 DSD 倍率与更完整的整形流程。</li><li>最终听感仍受<strong>房间声学、模拟前端、耳机／音箱与摆位</strong>共同限制——数字处理只是其中一环。</li></ul>",
          footerCopy: "音响工程师的数字工具箱 © 2024",
          footerNote: "参考工具 · 与 HQPLAYER 无关联"
        },
        "zh-TW": {
          htmlLang: "zh-Hant",
          docTitle: "發燒友知識科普 · PCM、DSD 與升頻",
          langLabel: "語言",

          navDamping: "阻尼",
          navCable: "線材",
          navHq: "濾波表",
          navDb: "分貝",
          brandLine: "Hi-End Digital Audio Lab",
          pageTitle: "發燒友知識科普",
          subtitle: "PCM · DSD · 升頻 · 播放鏈",
          eduLead:
            "以下內容說明 PCM 與 DSD 的差異、播放鏈裡 DSD 的含義，以及升頻的作用。（科普用途，不能替代原廠規格或實驗室測量流程。）",
          eduPcmHeading: "PCM 和 DSD 有什麼差別？",
          eduPcmBody:
            "<p><strong>PCM</strong>（脈衝編碼調變）是最常見的數位音訊形式：在固定的<strong>取樣率</strong>（如 44.1 kHz、48 kHz、96 kHz、192 kHz）下，用<strong>多位元</strong>（16-bit、24-bit 等）記錄每個取樣點的振幅。錄音製作、剪輯、混音、母帶以及大多數發行格式（WAV、FLAC、AIFF 等）都以 PCM 或其無損封裝為主。</p><p><strong>DSD</strong> 則以<strong>1-bit、極高取樣率</strong>的碼流刻畫波形（常見階梯如 DSD64／128／256／512），透過超高頻密度與<strong>雜訊整形</strong>把量化雜訊推向聽覺敏感帶以外。檔案多為 DSF、DFF 或封裝於鏡像／專輯資料中；播放時常涉及特定的濾波或 SDM 路徑。</p><div class=\"edu-table-wrap\"><table class=\"edu-compare\"><thead><tr><th scope=\"col\">項目</th><th scope=\"col\">PCM</th><th scope=\"col\">DSD</th></tr></thead><tbody><tr><td>時間與振幅編碼</td><td>等間隔取樣 + 多位元量化深度</td><td>超高取樣率 1-bit 密度變化（雜訊整形密切相關）</td></tr><tr><td>後期與生態</td><td>編輯、效果與音量處理成熟，相容面廣</td><td>重度編輯不如 PCM 直觀；部分母帶與工作流較小眾</td></tr><tr><td>DAC 常見情形</td><td>多級濾波與超取樣後類比輸出</td><td>支援原生 DSD；也可能內部轉為 PCM／多位元再輸出</td></tr></tbody></table></div><p class=\"edu-note\"><strong>聽感沒有固定答案</strong>：同一曲目在不同母帶、濾波與類比前端下表現各異；重要的是<strong>整條播放鏈</strong>是否協調，而不是單獨迷信某一種格式標籤。</p>",
          eduDsdHeading: "什麼是 DSD？",
          eduDsdBody:
            "<p>DSD（Direct Stream Digital）是一種以<strong>極高取樣率的 1-bit 碼流</strong>來描述類比波形的格式；常見標識包括 DSD64（約 2.8224 MHz）、DSD128、DSD256，以及發燒討論裡常見的 <strong>DSD512</strong>。與 PCM「在每個取樣點用多位元表示振幅」不同，DSD 透過<strong>超高頻的密度變化</strong>承載音訊，並傾向於把量化雜訊推向音樂頻寬之外的頻段（概念上接近雜訊整形）。</p><p>在實際播放中，即便檔案標註為 DSD，鏈路仍可能經歷<strong>數位濾波、轉換或重新調變</strong>；最終送入 DAC 晶片的資料流，未必與標籤完全一致。這也是玩家會細究 HQPlayer、插值濾波器與 SDM／Δ-Σ 路徑的原因——它們影響<strong>阻帶抑制、相位特性與雜訊譜形狀</strong>。</p>",
          eduUpsHeading: "為什麼要升頻？",
          eduUpsBody:
            "<p><strong>升頻（Upsampling）</strong>會把較低的取樣率推算到更高的目標速率（例如追求更高倍率的 DSD）。它的核心價值並不是「憑空創造錄音裡沒有的細節」，而是為<strong>數位濾波與雜訊整形</strong>提供更寬裕的條件：過渡帶可以設計得更乾淨，量化雜訊更容易被推離聽覺敏感區。</p><p>但升頻越高，通常也意味著<strong>CPU／記憶體佔用、延遲與功耗</strong>同步上升；濾波越精密，對時鐘與緩衝也越挑剔。建議先保證播放<strong>穩定不卡頓</strong>，再逐步提高目標速率或更換更高階演算法。</p><ul class=\"edu-list\"><li>若出現爆音、卡頓或緩衝警告：降低目標速率，或改用較輕的濾波／SDM。</li><li>若系統仍有裕量：再嘗試更高的 DSD 倍率與更完整的整形流程。</li><li>最終聽感仍受<strong>房間聲學、類比前端、耳機／音箱與擺位</strong>共同限制——數位處理只是其中一環。</li></ul>",
          footerCopy: "音響工程師的數位工具箱 © 2024",
          footerNote: "參考工具 · 與 HQPLAYER 無商業關聯"
        },

      };

      function getStrings(lang) {
        return STRINGS[lang] || STRINGS[DEFAULT_LANG];
      }

      function setBodyLangClass(lang) {
        document.body.classList.remove("lang-en", "lang-ja", "lang-zh-CN", "lang-zh-TW");
        document.body.classList.add("lang-" + lang);
      }

      var langSelect = document.getElementById("lang-select");

      function applyLocale(lang) {
        if (!STRINGS[lang]) lang = DEFAULT_LANG;
        setBodyLangClass(lang);
        document.documentElement.dir = "ltr";
        var L = getStrings(lang);
        document.documentElement.lang = L.htmlLang;
        document.title = L.docTitle;

        document.getElementById("nav-brand-text").textContent = L.navBrandText;
        document.getElementById("nav-roon-hqp").textContent = L.navRoonHqp;
        document.getElementById("nav-link-tools").textContent = L.navTools;
        document.getElementById("nav-damping").textContent = L.navDamping;
        document.getElementById("nav-cable").textContent = L.navCable;
        document.getElementById("nav-hq").textContent = L.navHq;
        document.getElementById("nav-db").textContent = L.navDb;
        document.getElementById("nav-link-knowledge").textContent = L.navKnowledge;
        document.getElementById("nav-roon").textContent = L.navRoon;

        document.getElementById("i18n-lang-label").textContent = L.langLabel;
        document.getElementById("i18n-brand").textContent = L.brandLine;
        document.getElementById("i18n-page-title").textContent = L.pageTitle;
        document.getElementById("i18n-subtitle").textContent = L.subtitle;
        document.getElementById("edu-lead").textContent = L.eduLead;
        document.getElementById("edu-pcm-heading").textContent = L.eduPcmHeading;
        document.getElementById("edu-pcm-body").innerHTML = L.eduPcmBody;
        document.getElementById("edu-dsd-heading").textContent = L.eduDsdHeading;
        document.getElementById("edu-dsd-body").innerHTML = L.eduDsdBody;
        document.getElementById("edu-ups-heading").textContent = L.eduUpsHeading;
        document.getElementById("edu-ups-body").innerHTML = L.eduUpsBody;

        document.getElementById("i18n-footer-copy").textContent = L.footerCopy;
        document.getElementById("i18n-footer-note").textContent = L.footerNote;

        langSelect.value = lang;
        try {
          localStorage.setItem(STORAGE_KEY, lang);
        } catch (e) {}
      }

      langSelect.addEventListener("change", function () {
        applyLocale(langSelect.value);
      });

      var initial = DEFAULT_LANG;
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved && STRINGS[saved]) initial = saved;
      } catch (e) {}
      applyLocale(initial);
    })();
  </script>
