<body class="lang-zh-TW">
  <nav class="site-nav" aria-label="Primary navigation">

      <div class="nav-actions">
        <label for="lang-select" id="i18n-lang-label"></label>
        <select id="lang-select" aria-label="Language">
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="zh-CN">中文（简体）</option>
          <option value="zh-TW" selected>中文（繁體）</option>
        </select>
      </div>
    </div>
  </nav>

  <div class="wrap">
    <header class="page-section page-hero" id="top">
      <div class="brand-line" id="i18n-brand"></div>
      <h1 id="i18n-page-title"></h1>
    </header>

    <section class="panel tool-single page-section" aria-labelledby="i18n-page-title">
      <p class="hint" id="damping-hint"></p>
      <div class="calc-two-col">
        <div class="field">
          <label for="damping-hp-z" id="i18n-damping-hp-label"></label>
          <input type="number" id="damping-hp-z" min="0.1" step="0.1" value="300" inputmode="decimal" />
        </div>
        <div class="field">
          <label for="damping-amp-z" id="i18n-damping-amp-label"></label>
          <input type="number" id="damping-amp-z" min="0" step="0.01" value="1" inputmode="decimal" />
        </div>
      </div>
      <button type="button" class="btn-3d" id="btn-damping"></button>
      <div id="damping-result" class="result-block" hidden>
        <div class="result-value" id="damping-value"></div>
        <p class="result-note" id="damping-note"></p>
      </div>
    </section>
    <footer class="site-footer">
      <p class="footer-copy" id="i18n-footer-copy"></p>
      <p class="footer-note" id="i18n-footer-note"></p>
    </footer>
  </div>
  <script>
    (function () {

      var STORAGE_KEY = "hiend-audio-calc-lang";
      var DEFAULT_LANG = "zh-TW";
            var STRINGS = {
        en: {
          htmlLang: "en",
          docTitle: "Headphone damping factor · Hi-End Lab",
          langLabel: "Language",
          navBrandText: "Hi-End Lab",
          navTools: "Tools",
          navKnowledge: "Primer",
          navRoon: "roon",
          navRoonHqp: "Roon + HQPlayer setup",
          navDamping: "DF",
          navCable: "Cable",
          navHq: "Filters",
          navDb: "dB",
          brandLine: "Hi-End Digital Audio Lab",
          dampingTitle: "Headphone damping factor",
          footerCopy: "Sound Engineer’s Digital Toolbox © 2024",
          footerNote: "REFERENCE TOOL · NOT AFFILIATED WITH HQPLAYER",
          dampingHint: "DF ≈ Z<sub>headphone</sub> ÷ Z<sub>out(amp)</sub>. Higher amplifier output impedance lowers DF and can loosen bass control.",
          dampingHpLabel: "Headphone impedance (Ω)",
          dampingAmpLabel: "Amplifier output Z (Ω)",
          btnDamping: "Calculate DF",
          dampingIdealHtml: "DF → <strong>∞</strong> <span style=\"opacity:.75\">(ideal 0 Ω source)</span>",
          dampingResultHtml: function (df) {
            return "DF ≈ <strong>" + df.toFixed(2) + "</strong>";
          },
          dampingResultExplain: "Rule of thumb: DF > 8 is often cited as a usable minimum for driver control; many enthusiasts prefer higher values. Actual sound depends on the headphone motor & damping network.",
          errDamping: "Enter valid impedances (headphone > 0, output ≥ 0).",
        },
        ja: {
          htmlLang: "ja",
          docTitle: "ヘッドホン DF · Hi-End Lab",
          langLabel: "表示言語",
          navBrandText: "Hi-End Lab",
          navTools: "ツール",
          navKnowledge: "解説",
          navRoon: "roon",
          navRoonHqp: "Roon＋HQPlayer 設定",
          navDamping: "DF",
          navCable: "ケーブル",
          navHq: "フィルタ",
          navDb: "dB",
          brandLine: "Hi-End Digital Audio Lab",
          dampingTitle: "ヘッドホン・ダンピングファクター（DF）",
          footerCopy: "音響エンジニアのデジタル・ツールボックス © 2024",
          footerNote: "参考ツール · HQPLAYER 非関連",
          dampingHint: "DF ≈ Z<sub>ヘッドホン</sub> ÷ アンプの出力インピーダンス。出力 Z が高いほど DF は下がり、低音の制動が甘くなることがあります。",
          dampingHpLabel: "ヘッドホンインピーダンス（Ω）",
          dampingAmpLabel: "アンプ出力インピーダンス（Ω）",
          btnDamping: "DF を計算",
          dampingIdealHtml: "DF → <strong>∞</strong> <span style=\"opacity:.75\">（理想的 0 Ω ソース）</span>",
          dampingResultHtml: function (df) {
            return "DF ≈ <strong>" + df.toFixed(2) + "</strong>";
          },
          dampingResultExplain: "目安として DF＞8 などが語られることがありますが、実際の駆動はドライバ仕様次第です。",
          errDamping: "正しいインピーダンスを入力してください（ヘッドホンは正の値、出力は 0 以上）。",
        },
        "zh-CN": {
          htmlLang: "zh-Hans",
          docTitle: "耳机阻尼系数 · Hi-End Lab",
          langLabel: "语言",
          navBrandText: "Hi-End Lab",
          navTools: "计算工具",
          navKnowledge: "知识科普",
          navRoon: "roon",
          navRoonHqp: "roon+HQPlayer 设置",
          navDamping: "阻尼",
          navCable: "线材",
          navHq: "滤波表",
          navDb: "分贝",
          brandLine: "Hi-End Digital Audio Lab",
          dampingTitle: "阻抗匹配 · 阻尼系数（DF）",
          footerCopy: "音响工程师的数字工具箱 © 2024",
          footerNote: "参考工具 · 与 HQPLAYER 无关联",
          dampingHint: "DF ≈ 耳机阻抗 ÷ 放大器输出阻抗。输出阻抗越高，DF 越低，低频控制力可能变差。",
          dampingHpLabel: "耳机阻抗（Ω）",
          dampingAmpLabel: "放大器输出阻抗（Ω）",
          btnDamping: "计算阻尼系数",
          dampingIdealHtml: "DF → <strong>∞</strong> <span style=\"opacity:.75\">（理想 0 Ω 音源）</span>",
          dampingResultHtml: function (df) {
            return "DF ≈ <strong>" + df.toFixed(2) + "</strong>";
          },
          dampingResultExplain: "经验上常提到 DF＞8 等参考值，实际听感仍取决于耳机单元与阻尼网络。",
          errDamping: "请输入有效阻抗（耳机须为正数，输出须≥0）。",
        },
        "zh-TW": {
          htmlLang: "zh-Hant",
          docTitle: "阻尼係數 DF · Hi-End Lab",
          langLabel: "語言",
          navBrandText: "Hi-End Lab",
          navTools: "計算工具",
          navKnowledge: "知識科普",
          navRoon: "roon",
          navRoonHqp: "roon+HQPlayer 設定",
          navDamping: "阻尼",
          navCable: "線材",
          navHq: "濾波表",
          navDb: "分貝",
          brandLine: "Hi-End Digital Audio Lab",
          dampingTitle: "阻抗匹配 · 阻尼係數（DF）",
          footerCopy: "音響工程師的數位工具箱 © 2024",
          footerNote: "參考工具 · 與 HQPLAYER 無商業關聯",
          dampingHint: "DF ≈ 耳機阻抗 ÷ 擴大機輸出阻抗。輸出阻抗越高，DF 越低，低頻控制力可能變差。",
          dampingHpLabel: "耳機阻抗（Ω）",
          dampingAmpLabel: "擴大機輸出阻抗（Ω）",
          btnDamping: "計算阻尼係數",
          dampingIdealHtml: "DF → <strong>∞</strong> <span style=\"opacity:.75\">（理想 0 Ω 訊號源）</span>",
          dampingResultHtml: function (df) {
            return "DF ≈ <strong>" + df.toFixed(2) + "</strong>";
          },
          dampingResultExplain: "經驗上常聽到 DF＞8 等說法，實際聽感仍取決於單體與阻尼網路。",
          errDamping: "請輸入有效阻抗（耳機須為正數，輸出須≥0）。",
        },

      };
      function getStrings(lang) {
        return STRINGS[lang] || STRINGS[DEFAULT_LANG];
      }
      function setBodyLangClass(lang) {
        document.body.classList.remove("lang-en", "lang-ja", "lang-zh-CN", "lang-zh-TW");
        document.body.classList.add("lang-" + lang);
      }
      var langSelect = document.getElementById("lang-select");
      var currentLang = DEFAULT_LANG;

      function applyLocale(lang) {
        if (!STRINGS[lang]) lang = DEFAULT_LANG;
        currentLang = lang;
        setBodyLangClass(lang);
        document.documentElement.dir = "ltr";
        var L = getStrings(lang);
        document.documentElement.lang = L.htmlLang;
        document.title = L.docTitle;
        document.getElementById("nav-brand-text").textContent = L.navBrandText;
        document.getElementById("nav-roon-hqp").textContent = L.navRoonHqp;
        document.getElementById("nav-link-tools").textContent = L.navTools;
        document.getElementById("nav-link-knowledge").textContent = L.navKnowledge;
        document.getElementById("nav-roon").textContent = L.navRoon;
        document.getElementById("nav-damping").textContent = L.navDamping;
        document.getElementById("nav-cable").textContent = L.navCable;
        document.getElementById("nav-hq").textContent = L.navHq;
        document.getElementById("nav-db").textContent = L.navDb;
        document.getElementById("i18n-lang-label").textContent = L.langLabel;
        document.getElementById("i18n-brand").textContent = L.brandLine;
        document.getElementById("i18n-page-title").textContent = L.dampingTitle;
        document.getElementById("damping-hint").innerHTML = L.dampingHint;
        document.getElementById("i18n-damping-hp-label").textContent = L.dampingHpLabel;
        document.getElementById("i18n-damping-amp-label").textContent = L.dampingAmpLabel;
        document.getElementById("btn-damping").textContent = L.btnDamping;
        document.getElementById("i18n-footer-copy").textContent = L.footerCopy;
        document.getElementById("i18n-footer-note").textContent = L.footerNote;
        langSelect.value = lang;
        try {
          localStorage.setItem(STORAGE_KEY, lang);
        } catch (e) {}
      }

      document.getElementById("btn-damping").addEventListener("click", function () {
        var L = getStrings(currentLang);
        var zHp = parseFloat(document.getElementById("damping-hp-z").value, 10);
        var zAmp = parseFloat(document.getElementById("damping-amp-z").value, 10);
        var box = document.getElementById("damping-result");
        var valEl = document.getElementById("damping-value");
        var noteEl = document.getElementById("damping-note");
        if (Number.isNaN(zHp) || zHp <= 0 || Number.isNaN(zAmp) || zAmp < 0) {
          box.hidden = false;
          valEl.textContent = L.errDamping;
          valEl.style.color = "#c9a962";
          noteEl.textContent = "";
          return;
        }
        box.hidden = false;
        valEl.style.color = "";
        if (zAmp === 0) {
          valEl.innerHTML = L.dampingIdealHtml;
        } else {
          valEl.innerHTML = L.dampingResultHtml(zHp / zAmp);
        }
        noteEl.textContent = L.dampingResultExplain;
      });

      langSelect.addEventListener("change", function () {
        applyLocale(langSelect.value);
      });

      var initial = DEFAULT_LANG;
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved && STRINGS[saved]) initial = saved;
      } catch (e) {}
      applyLocale(initial);
    })();
  </script>
</body>
</html>
