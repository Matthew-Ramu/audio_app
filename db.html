          dbHint: "相对电平 ΔdB：电压乘以 10<sup>Δ/20</sup>。+6 dB ≈ 电压 ×2；-6 dB ≈ ×0.5。",
          dbLabel: "电平变化 ΔdB",
          dbResultHtml: function (ratio, db) {
            return (

            );

        },

        ru: {

          navCable: "Кабель",
          navHq: "Фильтры",
          navDb: "дБ",
          brandLine: "Hi-End Digital Audio Lab",
          footerCopy: "Цифровой набор инженера по звуку © 2024",
          footerNote: "СПРАВОЧНЫЙ ИНСТРУМЕНТ · НЕ СВЯЗАН С HQPLAYER",
          dbTitle: "Интерактивно: дБ ↔ отношение напряжения",
          dbHint:
            "Относительный уровень ΔdB умножает амплитуду на 10<sup>ΔdB/20</sup>. +6 дБ ≈ ×2 напряжения; −6 дБ ≈ ×0,5.",
          dbLabel: "Изменение уровня ΔdB",
          dbResultHtml: function (ratio, db) {
            return (
              "Δ = <strong>" +
              db +
              "</strong> дБ → напряжение × <strong>" +
              ratio.toFixed(5) +
              "</strong>"
            );
          },
          errDb: "Введите корректное число."
        },
        de: {
          htmlLang: "de",
          docTitle: "dB ↔ Spannungsverhältnis · Hi-End Lab",
          langLabel: "Sprache",
          navBrandText: "Hi-End Lab",
          navTools: "Werkzeuge",
          navKnowledge: "Grundlagen",
          navRoon: "roon",
          navDamping: "Dämpfung",
          navCable: "Kabel",
          navHq: "Filter",
          navDb: "dB",
          brandLine: "Hi-End Digital Audio Lab",
          footerCopy: "Digitale Werkzeugkiste des Tontechnikers © 2024",
          footerNote: "REFERENZTOOL · KEINE VERBINDUNG ZU HQPLAYER",
          dbTitle: "Interaktiv dB ↔ Spannungsverhältnis",
          dbHint:
            "Relativer Pegel ΔdB multipliziert die Amplitude mit 10<sup>ΔdB/20</sup>. +6 dB ≈ Spannung ×2; −6 dB ≈ ×0,5.",
          dbLabel: "Pegeländerung ΔdB",
          dbResultHtml: function (ratio, db) {
            return (
              "Δ = <strong>" +
              db +
              "</strong> dB → Spannung × <strong>" +
              ratio.toFixed(5) +

        },
        ar: {
          htmlLang: "ar",
          docTitle: "ديسيبل ↔ نسبة الجهد · Hi-End Lab",
          langLabel: "اللغة",
          navBrandText: "Hi-End Lab",
          navTools: "الأدوات",
          navKnowledge: "مقدّمة",
          navRoon: "roon",
          navDamping: "التخميد",
          navCable: "الكابلات",
          navHq: "المرشحات",
          navDb: "ديسيبل",
          brandLine: "Hi-End Digital Audio Lab",
          footerCopy: "صندوق أدوات مهندس الصوت الرقمي © 2024",
          footerNote: "أداة مرجعية · غير تابعة لـ HQPLAYER",
          dbTitle: "تفاعلي: ديسيبل ↔ نسبة الجهد",
          dbHint:
            "ΔdB النسبي يضرب السعة بـ 10<sup>ΔdB/20</sup>. +6 dB ≈ ضعف الجهد؛ −6 dB ≈ النصف.",

          dbResultHtml: function (ratio, db) {
            return (
              "Δ = <strong>" +
              db +
              "</strong> dB → الجهد × <strong>" +
              ratio.toFixed(5) +
              "</strong>"
            );
          },
          errDb: "أدخل رقمًا صالحًا."
        }

      };
      function getStrings(lang) {
        return STRINGS[lang] || STRINGS[DEFAULT_LANG];
      }
      function setBodyLangClass(lang) {
        document.body.classList.remove("lang-en", "lang-ja", "lang-zh-CN", "lang-zh-TW", "lang-de", "lang-ru", "lang-ar");
        document.body.classList.add("lang-" + lang);
      }
      var langSelect = document.getElementById("lang-select");
      var currentLang = DEFAULT_LANG;

      function refreshDb() {
        var L = getStrings(currentLang);
        var inp = document.getElementById("db-input");
        var out = document.getElementById("db-live-result");
        if (!inp.value.trim()) {
          out.innerHTML = "";
          return;
        }
        var db = parseFloat(inp.value, 10);
        if (Number.isNaN(db)) {
          out.textContent = L.errDb;
          return;
        }
        var ratio = Math.pow(10, db / 20);
        out.innerHTML = L.dbResultHtml(ratio, db);
      }

      function applyLocale(lang) {
        if (!STRINGS[lang]) lang = DEFAULT_LANG;
        currentLang = lang;
        setBodyLangClass(lang);
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
        var L = getStrings(lang);
        document.documentElement.lang = L.htmlLang;
        document.title = L.docTitle;
        document.getElementById("nav-brand-text").textContent = L.navBrandText;
        document.getElementById("nav-link-tools").textContent = L.navTools;
        document.getElementById("nav-link-knowledge").textContent = L.navKnowledge;
        document.getElementById("nav-roon").textContent = L.navRoon;
        document.getElementById("nav-damping").textContent = L.navDamping;
        document.getElementById("nav-cable").textContent = L.navCable;
        document.getElementById("nav-hq").textContent = L.navHq;
        document.getElementById("nav-db").textContent = L.navDb;
        document.getElementById("i18n-lang-label").textContent = L.langLabel;
        document.getElementById("i18n-brand").textContent = L.brandLine;
        document.getElementById("i18n-page-title").textContent = L.dbTitle;
        document.getElementById("db-hint").innerHTML = L.dbHint;
        document.getElementById("i18n-db-label").textContent = L.dbLabel;
        document.getElementById("i18n-footer-copy").textContent = L.footerCopy;
        document.getElementById("i18n-footer-note").textContent = L.footerNote;
        langSelect.value = lang;
        try {
          localStorage.setItem(STORAGE_KEY, lang);
        } catch (e) {}
        refreshDb();
      }

      document.getElementById("db-input").addEventListener("input", refreshDb);
      document.getElementById("db-input").addEventListener("change", refreshDb);

      langSelect.addEventListener("change", function () {
        applyLocale(langSelect.value);
      });

      var initial = DEFAULT_LANG;
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved && STRINGS[saved]) initial = saved;
      } catch (e) {}
      applyLocale(initial);
    })();
  </script>
</body>
